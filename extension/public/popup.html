<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Business Data</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #0F172A;
      background: #F8FAFC;
    }

    /* Header */
    .header {
      background: #1E293B;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px; height: 28px;
      background: #2563EB;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 14px;
      flex-shrink: 0;
    }
    .header-title { color: #fff; font-weight: 600; font-size: 14px; }
    .header-sub   { color: #94A3B8; font-size: 11px; margin-top: 1px; }

    /* Body sections */
    .section { padding: 14px 16px; border-bottom: 1px solid #E2E8F0; background: #fff; }
    .section:last-child { border-bottom: none; }

    .label { font-size: 11px; color: #64748B; font-weight: 500; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .value { font-size: 13px; color: #0F172A; font-weight: 500; }

    /* Auth */
    .auth-row { display: flex; align-items: center; justify-content: space-between; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .badge-green { background: #F0FDF4; color: #16A34A; }
    .badge-gray  { background: #F1F5F9; color: #64748B; }
    .badge-blue  { background: #EFF6FF; color: #2563EB; }
    .badge-orange{ background: #FFFBEB; color: #D97706; }
    .badge-red   { background: #FEF2F2; color: #DC2626; }

    /* Progress */
    .progress-bar-bg {
      height: 6px; background: #E2E8F0; border-radius: 3px; margin-top: 8px;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 3px;
      background: #2563EB;
      transition: width 0.4s ease;
    }
    .stats-row { display: flex; gap: 16px; margin-top: 10px; }
    .stat { flex: 1; }
    .stat-val { font-size: 18px; font-weight: 700; color: #0F172A; line-height: 1; }
    .stat-lbl { font-size: 10px; color: #94A3B8; margin-top: 2px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 14px; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer; border: none;
      transition: opacity 0.15s;
      width: 100%;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary   { background: #2563EB; color: #fff; }
    .btn-secondary { background: #fff; color: #374151; border: 1px solid #E2E8F0; }
    .btn-danger    { background: #FEF2F2; color: #DC2626; border: 1px solid #FCA5A5; }
    .btn-row { display: flex; gap: 8px; }

    /* No-job state */
    .empty { text-align: center; padding: 20px 0; color: #94A3B8; }
    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    /* Footer */
    .footer {
      padding: 10px 16px;
      background: #F8FAFC;
      border-top: 1px solid #E2E8F0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-link { font-size: 11px; color: #2563EB; text-decoration: none; cursor: pointer; }
    .credits { font-size: 11px; color: #64748B; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">G</div>
    <div>
      <div class="header-title">Google Business Data</div>
      <div class="header-sub" id="header-sub">Yükleniyor...</div>
    </div>
  </div>

  <!-- Auth section -->
  <div class="section" id="section-auth">
    <div class="label">Hesap</div>
    <div class="auth-row">
      <div class="value" id="auth-email">—</div>
      <span class="badge badge-gray" id="auth-badge">Bağlı değil</span>
    </div>
  </div>

  <!-- Job status section -->
  <div class="section" id="section-job" style="display:none">
    <div class="label">Aktif İş</div>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
      <div class="value" id="job-query" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;">—</div>
      <span class="badge" id="job-status-badge">—</span>
    </div>
    <div style="font-size:11px; color:#64748B;" id="job-location">—</div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-val" id="stat-found">0</div>
        <div class="stat-lbl">Bulunan</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-scraped">0</div>
        <div class="stat-lbl">Çekilen</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-remaining">0</div>
        <div class="stat-lbl">Kalan</div>
      </div>
    </div>

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div style="font-size:10px; color:#94A3B8; margin-top:4px;" id="progress-text">0% tamamlandı</div>
  </div>

  <!-- No active job -->
  <div class="section" id="section-no-job">
    <div class="empty">
      <div class="empty-icon">⚡</div>
      <div style="font-size:12px; color:#64748B;">Aktif iş yok</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="section" id="section-actions">
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-new-job">+ Yeni İş</button>
      <button class="btn btn-danger"  id="btn-cancel" style="display:none">İptal</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="credits" id="footer-credits">— kredi</span>
    <a class="footer-link" id="btn-login" style="display:none">Giriş Yap</a>
    <a class="footer-link" id="btn-dashboard">Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
